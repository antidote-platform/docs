    post:
      tags:
      - auth
      summary: Request Password Reset
      description: 'Request a password reset link.


        Security: always returns ok (no user enumeration).'
      operationId: request_password_reset_api_auth_password_forgot_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetEmailRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Request Password Reset Api Auth Password Forgot Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/password/reset/confirm:
