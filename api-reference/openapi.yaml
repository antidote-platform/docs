  /api/datasets:
    get:
      tags:
      - api
      - datasets
      summary: List Datasets
      operationId: list_datasets_api_datasets_get
      security:
      - HTTPBearer: []
      parameters:
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 20
          title: Per Page
      - name: include_branches
        in: query
        required: false
        schema:
          type: boolean
          description: Include non-main branch datasets in the response.
          default: false
          title: Include Branches
        description: Include non-main branch datasets in the response.
      - name: include_removed
        in: query
        required: false
        schema:
          type: boolean
          description: Include removed datasets in the response.
          default: false
          title: Include Removed
        description: Include removed datasets in the response.
      - name: include_issue_counts
        in: query
        required: false
        schema:
          type: boolean
          description: Include per-dataset issue breakdowns (mislabel/outlier/poison).
            Disabling is faster.
          default: true
          title: Include Issue Counts
        description: Include per-dataset issue breakdowns (mislabel/outlier/poison).
          Disabling is faster.
      - name: include_type_counts
        in: query
        required: false
        schema:
          type: boolean
          description: Include vulnerability type counters and inferred issue types.
            Disabling is faster.
          default: true
          title: Include Type Counts
        description: Include vulnerability type counters and inferred issue types.
          Disabling is faster.
      - name: sort_by
        in: query
        required: false
        schema:
          enum:
          - name
          - updated_at
          - created_at
          - size_bytes
          - last_scan_at
          - status
          - severity
          type: string
          default: name
          title: Sort By
      - name: sort_order
        in: query
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
          default: asc
          title: Sort Order
      - name: type[]
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: Filter datasets by primary issue type (e.g., Mislabeled, Outlier,
            Poisoned, N/A).
          title: Type[]
        description: Filter datasets by primary issue type (e.g., Mislabeled, Outlier,
          Poisoned, N/A).
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      - name: antidote_session
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Antidote Session
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - api
      - datasets
      summary: Create Dataset
      operationId: create_dataset_api_datasets_post
      security:
      - HTTPBearer: []
      parameters:
      - name: X-API-Key
        in: header
        required: false
